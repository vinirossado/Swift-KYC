name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
  FRAMEWORK_NAME: IdentityKit
  SCHEME: IdentityKit

jobs:
  release:
    name: Build & Publish Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Parse version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build XCFramework
        run: |
          set -euo pipefail

          ARCHIVE_DIR="$(pwd)/build/archives"
          OUTPUT_DIR="$(pwd)/build"
          mkdir -p "$ARCHIVE_DIR" "$OUTPUT_DIR"

          # Build for iOS device (arm64)
          xcodebuild archive \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_DIR/ios-device.xcarchive" \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            OTHER_SWIFT_FLAGS="-no-verify-emitted-module-interface"

          # Build for iOS Simulator (arm64)
          xcodebuild archive \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS Simulator" \
            -archivePath "$ARCHIVE_DIR/ios-simulator.xcarchive" \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            OTHER_SWIFT_FLAGS="-no-verify-emitted-module-interface"

          # Collect -framework flags for each target in the umbrella library
          FRAMEWORK_ARGS=""
          for TARGET in IdentityKitCore IdentityKitCapture IdentityKitUI IdentityKitNetwork IdentityKitStorage; do
            FRAMEWORK_ARGS="$FRAMEWORK_ARGS \
              -framework $ARCHIVE_DIR/ios-device.xcarchive/Products/Library/Frameworks/$TARGET.framework \
              -framework $ARCHIVE_DIR/ios-simulator.xcarchive/Products/Library/Frameworks/$TARGET.framework"
          done

          # Create XCFramework
          xcodebuild -create-xcframework \
            $FRAMEWORK_ARGS \
            -output "$OUTPUT_DIR/$FRAMEWORK_NAME.xcframework"

      - name: Compress XCFramework
        run: |
          cd build
          zip -r -y "$FRAMEWORK_NAME.xcframework.zip" "$FRAMEWORK_NAME.xcframework"

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(swift package compute-checksum "build/$FRAMEWORK_NAME.xcframework.zip")
          echo "sha256=$CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "Checksum: $CHECKSUM"

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Try to get the previous tag; fall back to first commit
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || git rev-list --max-parents=0 HEAD)
          {
            echo "body<<RELEASE_EOF"
            echo "## What's Changed"
            echo ""
            git log --pretty=format:"- %s (%h)" "$PREV_TAG..$TAG"
            echo ""
            echo ""
            echo "## XCFramework Checksum (SHA-256)"
            echo '```'
            echo "${{ steps.checksum.outputs.sha256 }}"
            echo '```'
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "build/$FRAMEWORK_NAME.xcframework.zip" \
            --title "$FRAMEWORK_NAME ${{ steps.version.outputs.value }}" \
            --notes "${{ steps.notes.outputs.body }}" \
            --verify-tag

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

jobs:
  release:
    name: Test & Publish Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Parse version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: swift test --enable-code-coverage

      - name: Build for iOS (verify compiles)
        run: |
          xcodebuild build \
            -scheme IdentityKit-Package \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -quiet

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || git rev-list --max-parents=0 HEAD)
          {
            echo "body<<RELEASE_EOF"
            echo "## What's Changed"
            echo ""
            git log --pretty=format:"- %s (%h)" "$PREV_TAG..$TAG"
            echo ""
            echo ""
            echo "## Installation (Swift Package Manager)"
            echo '```swift'
            echo 'dependencies: ['
            echo "    .package(url: \"https://github.com/vinirossado/Swift-KYC.git\", from: \"${{ steps.version.outputs.value }}\")"
            echo ']'
            echo '```'
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "IdentityKit ${{ steps.version.outputs.value }}" \
            --notes "${{ steps.notes.outputs.body }}" \
            --verify-tag
